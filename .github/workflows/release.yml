name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compose-platforms:
    name: Build Android TV variants
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/compose
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Test shared UI and build Android TV APKs
        run: ./gradlew :torrent-runtime:test :shared-ui:desktopTest :android-app:assemblePlayDebug :android-app:assembleLauncherDebug :anime-android-app:assembleDebug
      - name: Verify embedded Android torrent engine ABIs
        run: |
          set -euo pipefail
          COUNT=0
          while IFS= read -r -d '' APK; do
            COUNT=$((COUNT + 1))
            LISTING="$RUNNER_TEMP/$(basename "$APK").listing"
            unzip -l "$APK" > "$LISTING"
            for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
              grep -q "lib/$ABI/libjlibtorrent-2.0.12.9.so" "$LISTING"
            done
            for NOTICE in \
              ThirdPartyNotices.txt \
              licenses/Apache-2.0.txt \
              licenses/GPL-2.0.txt \
              licenses/LGPL-2.1.txt \
              licenses/libtorrent-cb6fe6b9c28735b42edd77740a554d1709acad02-LICENSE.txt; do
              grep -q "assets/$NOTICE" "$LISTING"
              unzip -p "$APK" "assets/$NOTICE" | cmp - "package-resources/common/$NOTICE"
            done
          done < <(find android-app/build/outputs/apk anime-android-app/build/outputs/apk -name '*.apk' -print0)
          test "$COUNT" -ge 3
      - name: Verify launcher intent separation
        run: |
          PLAY="android-app/build/intermediates/merged_manifests/playDebug/processPlayDebugManifest/AndroidManifest.xml"
          LAUNCHER="android-app/build/intermediates/merged_manifests/launcherDebug/processLauncherDebugManifest/AndroidManifest.xml"
          ANIME="anime-android-app/build/intermediates/merged_manifests/debug/processDebugManifest/AndroidManifest.xml"
          grep -q "android.intent.category.LEANBACK_LAUNCHER" "$PLAY"
          ! grep -q "android.intent.category.HOME" "$PLAY"
          grep -q "android.intent.category.LEANBACK_LAUNCHER" "$LAUNCHER"
          grep -q "android.intent.category.HOME" "$LAUNCHER"
          grep -q 'android:usesCleartextTraffic="true"' "$PLAY"
          grep -q 'android:usesCleartextTraffic="true"' "$ANIME"
          for MANIFEST in "$PLAY" "$LAUNCHER" "$ANIME"; do
            grep -q 'android:minSdkVersion="26"' "$MANIFEST"
            grep -q "android:versionCode=\"${GITHUB_RUN_NUMBER}\"" "$MANIFEST"
            grep -q 'android:exported="true"' "$MANIFEST"
            grep -q 'android.intent.action.VIEW' "$MANIFEST"
            grep -q 'android.intent.category.DEFAULT' "$MANIFEST"
            grep -q 'android.intent.category.BROWSABLE' "$MANIFEST"
            grep -q 'android:scheme="magnet"' "$MANIFEST"
          done
      - name: Upload Android TV APKs
        uses: actions/upload-artifact@v4
        with:
          name: TVShell-Android-TV
          path: |
            platforms/compose/android-app/build/outputs/apk/play/debug/*.apk
            platforms/compose/android-app/build/outputs/apk/launcher/debug/*.apk
            platforms/compose/anime-android-app/build/outputs/apk/debug/*.apk

  windows-compose:
    name: Build Windows shell
    runs-on: windows-latest
    defaults:
      run:
        working-directory: platforms/compose
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Download embedded LibVLC runtime
        shell: pwsh
        run: |
          $version = "3.0.23.1"
          $archive = Join-Path $env:RUNNER_TEMP "videolan-libvlc-windows-$version.zip"
          $extract = Join-Path $env:RUNNER_TEMP "tvshell-vlc"
          $destination = "package-resources/windows/vlc"
          $allowList = "package-resources/windows/libvlc-plugins-x64.txt"
          $package = "https://api.nuget.org/v3-flatcontainer/videolan.libvlc.windows/$version/videolan.libvlc.windows.$version.nupkg"
          curl.exe -fL --retry 5 --retry-all-errors --output $archive $package
          $expected = "70927afa9ad34b77e7d9a5e6d02cae099771f6eb3114da18111a4b76f65b836f"
          $actual = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "LibVLC checksum mismatch: $actual" }
          Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $destination -ErrorAction SilentlyContinue
          Expand-Archive -Path $archive -DestinationPath $extract -Force
          $source = Join-Path $extract "build/x64"
          if (-not (Test-Path (Join-Path $source 'libvlc.dll')) -or
              -not (Test-Path (Join-Path $source 'libvlccore.dll')) -or
              -not (Test-Path (Join-Path $source 'plugins'))) {
            throw "VideoLAN.LibVLC.Windows package layout is invalid"
          }
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          Copy-Item -Force (Join-Path $source 'libvlc.dll') $destination
          Copy-Item -Force (Join-Path $source 'libvlccore.dll') $destination
          $pluginsDestination = Join-Path $destination 'plugins'
          New-Item -ItemType Directory -Force -Path $pluginsDestination | Out-Null
          $plugins = @(Get-Content $allowList | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          if ($plugins.Count -ne 176 -or $plugins.Count -ne ($plugins | Sort-Object -Unique).Count) {
            throw "The pinned libVLC plugin allowlist must contain 176 unique entries"
          }
          foreach ($relative in $plugins) {
            $nativeRelative = $relative.Replace([char]'/', [IO.Path]::DirectorySeparatorChar)
            $sourcePlugin = Join-Path (Join-Path $source 'plugins') $nativeRelative
            if (-not (Test-Path $sourcePlugin -PathType Leaf)) {
              throw "Pinned libVLC plugin is missing from NuGet: $relative"
            }
            $targetPlugin = Join-Path $pluginsDestination $nativeRelative
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $targetPlugin) | Out-Null
            Copy-Item -Force $sourcePlugin $targetPlugin
          }
          $copiedPlugins = @(Get-ChildItem $pluginsDestination -Recurse -Filter '*.dll')
          if ($copiedPlugins.Count -ne $plugins.Count) {
            throw "Embedded libVLC plugin count mismatch: $($copiedPlugins.Count)"
          }
          Copy-Item -Force $allowList (Join-Path $destination 'PLUGIN-ALLOWLIST.txt')
          @"
          VideoLAN.LibVLC.Windows $version
          Package: $package
          libVLC: LGPL-2.1-or-later
          Retained libavcodec/swscale modules use the package's GPL-enabled FFmpeg build:
          GPL-2.0-or-later.
          Optional x264 encoder, Lua, Dolby-surround and headphone-mixer plugins are excluded.
          Corresponding source is published with every TVShell Windows release
          as TVShell-Windows-Corresponding-Sources.zip.
          "@ | Set-Content -Path (Join-Path $destination 'SOURCE-AND-LICENSE.txt') -Encoding utf8
          "TVSHELL_VLC_DIR=$((Resolve-Path $destination).Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Prepare Windows corresponding sources
        shell: pwsh
        run: |
          $staging = "third-party-sources/staging"
          $destination = "third-party-sources/TVShell-Windows-Corresponding-Sources.zip"
          Remove-Item -Recurse -Force "third-party-sources" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          $downloads = @(
            @{
              Name = "vlc-3.0.23.tar.xz"
              Url = "https://download.videolan.org/pub/videolan/vlc/3.0.23/vlc-3.0.23.tar.xz"
              Sha256 = "e891cae6aa3ccda69bf94173d5105cbc55c7a7d9b1d21b9b21666e69eff3e7e0"
            },
            @{
              Name = "ffmpeg-4.4.5.tar.xz"
              Url = "https://ffmpeg.org/releases/ffmpeg-4.4.5.tar.xz"
              Sha256 = "f9514e0d3515aee5a271283df71636e1d1ff7274b15853bcd84e144be416ab07"
            },
            @{
              Name = "zlib-1.3.1.tar.xz"
              Url = "https://download.videolan.org/pub/contrib/zlib/zlib-1.3.1.tar.xz"
              Sha256 = "38ef96b8dfe510d42707d9c781877914792541133e1870841463bfa73f883e32"
            },
            @{
              Name = "libgsm_1.0.13.tar.gz"
              Url = "https://download.videolan.org/pub/contrib/gsm/libgsm_1.0.13.tar.gz"
              Sha256 = "52c518244d428c2e56c543b98c9135f4a76ff780c32455580b793f60a0a092ad"
            },
            @{
              Name = "openjpeg-2.5.0.tar.gz"
              Url = "https://download.videolan.org/pub/contrib/openjpeg/openjpeg-2.5.0.tar.gz"
              Sha256 = "0333806d6adecc6f7a91243b2b839ff4d2053823634d4f6ed7a59bc87409122a"
            },
            @{
              Name = "lame-3.100.tar.gz"
              Url = "https://download.videolan.org/pub/contrib/lame/lame-3.100.tar.gz"
              Sha256 = "ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e"
            },
            @{
              Name = "mingw-w64-v10.0.0.tar.bz2"
              Url = "https://downloads.sourceforge.net/project/mingw-w64/mingw-w64/mingw-w64-release/mingw-w64-v10.0.0.tar.bz2"
              Sha256 = "ba6b430aed72c63a3768531f6a3ffc2b0fde2c57a3b251450dcf489a894f0894"
            }
          )
          foreach ($item in $downloads) {
            $path = Join-Path $staging $item.Name
            curl.exe -fL --retry 5 --retry-all-errors --output $path $item.Url
            $actual = (Get-FileHash -Algorithm SHA256 $path).Hash.ToLowerInvariant()
            if ($actual -ne $item.Sha256) { throw "Source checksum mismatch for $($item.Name): $actual" }
          }
          Copy-Item "../../THIRD_PARTY_NOTICES.md" (Join-Path $staging "THIRD_PARTY_NOTICES.md")
          @"
          These are the corresponding upstream sources for the retained GPL/LGPL
          libVLC and FFmpeg modules redistributed in TVShell's Windows runtime.
          VLC's contrib rules and patches in vlc-3.0.23.tar.xz record the exact
          FFmpeg configuration and the zlib, GSM, OpenJPEG, LAME and winpthreads
          dependencies statically used by that build.

          Binary package: VideoLAN.LibVLC.Windows 3.0.23.1
          Source is provided without charge under each component's own license.
          "@ | Set-Content -Path (Join-Path $staging "README.txt") -Encoding utf8
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $destination -Force
      - name: Test Windows shared UI
        run: ./gradlew.bat :torrent-runtime:test :shared-ui:desktopTest --stacktrace
      - name: Package TVShell Windows MSI
        shell: pwsh
        run: |
          $output = & ./gradlew.bat :shared-ui:packageMsi --stacktrace 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Output $_ }
          if ($exitCode -ne 0) {
            $diagnostic = $output | Where-Object {
              $_ -match 'FAILURE|What went wrong|Execution failed|Caused by|Exception|Error|icon|jpackage|light.exe|candle.exe|WiX'
            } | Select-Object -First 60
            $message = ($diagnostic + ($output | Select-Object -Last 8)) -join "`n"
            $escaped = $message.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=TVShell MSI packaging failed::$escaped"
            exit $exitCode
          }
      - name: Package Anime Windows MSI
        run: ./gradlew.bat :anime-desktop:packageMsi --stacktrace
      - name: Package TVShell Windows portable ZIP
        shell: pwsh
        run: |
          ./gradlew.bat :shared-ui:createDistributable --stacktrace
          $source = "shared-ui/build/compose/binaries/main/app"
          $destination = "shared-ui/build/compose/binaries/main/portable/TVShell-Windows-Portable.zip"
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $destination) | Out-Null
          Compress-Archive -Path (Join-Path $source '*') -DestinationPath $destination -Force
      - name: Package Anime Windows portable ZIP
        shell: pwsh
        run: |
          ./gradlew.bat :anime-desktop:createDistributable --stacktrace
          $source = "anime-desktop/build/compose/binaries/main/app"
          $destination = "anime-desktop/build/compose/binaries/main/portable/TVShell-Anime-Windows-Portable.zip"
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $destination) | Out-Null
          Compress-Archive -Path (Join-Path $source '*') -DestinationPath $destination -Force
      - name: Verify embedded Windows torrent engine
        shell: pwsh
        run: |
          $roots = @(
            "shared-ui/build/compose/binaries/main/app",
            "anime-desktop/build/compose/binaries/main/app"
          )
          foreach ($root in $roots) {
            $jar = Get-ChildItem -Path $root -Recurse -Filter "jlibtorrent-windows-2.0.12.9*.jar" | Select-Object -First 1
            if (-not $jar) { throw "Missing jlibtorrent Windows native jar in $root" }
            $listing = & jar tf $jar.FullName
            if (-not ($listing -match "lib/x86_64/jlibtorrent-2.0.12.9.dll")) {
              throw "Missing jlibtorrent DLL inside $($jar.FullName)"
            }
            $libvlc = Get-ChildItem -Path $root -Recurse -Filter "libvlc.dll" | Select-Object -First 1
            if (-not $libvlc) { throw "Missing embedded LibVLC runtime in $root" }
            if (-not (Test-Path (Join-Path $libvlc.Directory.FullName "libvlccore.dll"))) {
              throw "Missing embedded libvlccore.dll in $root"
            }
            if (-not (Test-Path (Join-Path $libvlc.Directory.FullName "plugins"))) {
              throw "Missing embedded LibVLC plugins beside $($libvlc.FullName)"
            }
            $embeddedPlugins = @(Get-ChildItem (Join-Path $libvlc.Directory.FullName "plugins") -Recurse -Filter '*.dll')
            if ($embeddedPlugins.Count -ne 176) { throw "Unexpected embedded libVLC plugin count in $root" }
            foreach ($excluded in @(
              'audio_filter/libdolby_surround_decoder_plugin.dll',
              'audio_filter/libheadphone_channel_mixer_plugin.dll',
              'codec/libx26410b_plugin.dll',
              'lua/liblua_plugin.dll'
            )) {
              if (Test-Path (Join-Path (Join-Path $libvlc.Directory.FullName 'plugins') $excluded)) {
                throw "Excluded libVLC plugin was packaged: $excluded"
              }
            }
            $license = Join-Path $libvlc.Directory.FullName "SOURCE-AND-LICENSE.txt"
            if (-not (Test-Path $license) -or
                -not (Select-String -Quiet -Path $license -Pattern 'LGPL-2.1-or-later') -or
                -not (Select-String -Quiet -Path $license -Pattern 'GPL-2.0-or-later')) {
              throw "Missing embedded libVLC license/source notice in $root"
            }
            $notices = Get-ChildItem -Path $root -Recurse -Filter "ThirdPartyNotices.txt" | Select-Object -First 1
            if (-not $notices -or -not (Select-String -Quiet -Path $notices.FullName -Pattern 'OpenSSL 3.6.0')) {
              throw "Missing packaged native dependency notices in $root"
            }
          }
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: TVShell-Windows
          path: |
            platforms/compose/shared-ui/build/compose/binaries/main/msi/*.msi
            platforms/compose/anime-desktop/build/compose/binaries/main/msi/*.msi
            platforms/compose/shared-ui/build/compose/binaries/main/portable/*.zip
            platforms/compose/anime-desktop/build/compose/binaries/main/portable/*.zip
            platforms/compose/third-party-sources/TVShell-Windows-Corresponding-Sources.zip

  build:
    name: Build TVShell
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16 Toolchain
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            XCODE_16="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_16" ]; then
              sudo xcode-select -s "$XCODE_16"
            fi
          fi
          xcodebuild -version
          swift --version

      - name: Run Checks
        run: swift run TVShellChecks

      - name: Build Release Product
        run: swift build -c release --product TVShell

      - name: Resolve VLCKit
        id: vlckit
        run: |
          set -euo pipefail
          VLCKIT_METADATA="https://code.videolan.org/videolan/VLCKit/raw/master/Packaging/VLCKit.json"
          VLCKIT_URL="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 "$VLCKIT_METADATA" | jq -r 'to_entries | sort_by(.key | split(".") | map(tonumber)) | last.value')"
          if [ -z "$VLCKIT_URL" ] || [ "$VLCKIT_URL" = "null" ]; then
            echo "Could not resolve VLCKit download URL from $VLCKIT_METADATA" >&2
            exit 1
          fi

          VLCKIT_CACHE_KEY="vlckit-$(printf '%s' "$VLCKIT_URL" | shasum -a 256 | awk '{print $1}')"
          echo "url=$VLCKIT_URL" >> "$GITHUB_OUTPUT"
          echo "cache-key=$VLCKIT_CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "VLCKIT_URL=$VLCKIT_URL" >> "$GITHUB_ENV"
          echo "VLCKIT_CACHE_KEY=$VLCKIT_CACHE_KEY" >> "$GITHUB_ENV"
          echo "Resolved VLCKit from $VLCKIT_URL"

      - name: Cache VLCKit Archive
        uses: actions/cache@v4
        with:
          path: .cache/VLCKit.tar.xz
          key: ${{ steps.vlckit.outputs.cache-key }}

      - name: Download VLCKit
        run: |
          set -euo pipefail

          mkdir -p ".cache" "$RUNNER_TEMP/vlckit"
          ARCHIVE=".cache/VLCKit.tar.xz"
          if [ ! -s "$ARCHIVE" ]; then
            curl -fL \
              --retry 10 \
              --retry-all-errors \
              --retry-delay 5 \
              --connect-timeout 30 \
              --speed-time 30 \
              --speed-limit 1024 \
              --continue-at - \
              --output "$ARCHIVE" \
              "$VLCKIT_URL"
          else
            echo "Using cached VLCKit archive for $VLCKIT_CACHE_KEY"
          fi
          tar -xJf "$ARCHIVE" -C "$RUNNER_TEMP/vlckit"

          VLCKIT_FRAMEWORK="$(find "$RUNNER_TEMP/vlckit" -name VLCKit.framework -type d -print -quit)"
          if [ -z "$VLCKIT_FRAMEWORK" ] || [ ! -d "$VLCKIT_FRAMEWORK" ]; then
            echo "VLCKit.framework was not found after extracting $VLCKIT_URL" >&2
            find "$RUNNER_TEMP/vlckit" -maxdepth 4 -print
            exit 1
          fi

          echo "VLCKIT_FRAMEWORK=$VLCKIT_FRAMEWORK" >> "$GITHUB_ENV"
          echo "Using VLCKit from $VLCKIT_URL"

      - name: Package App Bundle
        run: |
          set -euo pipefail
          APP="dist/TVShell.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp .build/release/TVShell "$APP/Contents/MacOS/TVShell"
          chmod +x "$APP/Contents/MacOS/TVShell"
          cp assets/icons/TVShell.icns "$APP/Contents/Resources/TVShell.icns"
          cp -R "$VLCKIT_FRAMEWORK" "$APP/Contents/Frameworks/VLCKit.framework"
          xattr -cr "$APP/Contents/Frameworks/VLCKit.framework" || true
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>zh_TW</string>
            <key>CFBundleExecutable</key>
            <string>TVShell</string>
            <key>CFBundleIdentifier</key>
            <string>com.tvshell.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>TVShell</string>
            <key>CFBundleIconFile</key>
            <string>TVShell.icns</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          PLIST
          cat > "$APP/Contents/Resources/ThirdPartyNotices.txt" <<NOTICE
          TVShell embeds VideoLAN VLCKit for broad local and streaming media playback.

          VLCKit is distributed by VideoLAN under LGPL-2.1-or-later.
          Source and license information: https://code.videolan.org/videolan/VLCKit
          Binary metadata used by this build: https://code.videolan.org/videolan/VLCKit/raw/master/Packaging/VLCKit.json
          Download used by this build: ${VLCKIT_URL}
          NOTICE
          codesign --force --deep --sign - "$APP"
          (cd dist && zip -9 -r TVShell-macOS-${{ github.sha }}.zip TVShell.app)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVShell-macOS
          path: dist/TVShell-macOS-${{ github.sha }}.zip

  publish-release:
    name: Publish macOS, Windows, and Android TV
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    needs:
      - compose-platforms
      - windows-compose
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release repository
        uses: actions/checkout@v4
      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: TVShell-macOS
          path: artifacts/macos
      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: TVShell-Windows
          path: artifacts/windows
      - name: Download Android TV packages
        uses: actions/download-artifact@v4
        with:
          name: TVShell-Android-TV
          path: artifacts/android
      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp "$(find artifacts/macos -name '*.zip' -print -quit)" release-assets/TVShell-macOS.zip
          find artifacts/windows -name '*.msi' -exec cp {} release-assets/ \;
          TVSHELL_PORTABLE="$(find artifacts/windows -name 'TVShell-Windows-Portable.zip' -print -quit)"
          ANIME_PORTABLE="$(find artifacts/windows -name 'TVShell-Anime-Windows-Portable.zip' -print -quit)"
          test -n "$TVSHELL_PORTABLE"
          test -n "$ANIME_PORTABLE"
          cp "$TVSHELL_PORTABLE" release-assets/TVShell-Windows-Portable.zip
          cp "$ANIME_PORTABLE" release-assets/TVShell-Anime-Windows-Portable.zip
          cp "$(find artifacts/windows -name 'TVShell-Windows-Corresponding-Sources.zip' -print -quit)" release-assets/TVShell-Windows-Corresponding-Sources.zip
          cp "$(find artifacts/android -path '*/android-app/build/outputs/apk/play/debug/*.apk' -print -quit)" release-assets/TVShell-Android-TV.apk
          cp "$(find artifacts/android -path '*/android-app/build/outputs/apk/launcher/debug/*.apk' -print -quit)" release-assets/TVShell-Android-TV-Launcher.apk
          cp "$(find artifacts/android -path '*/anime-android-app/build/outputs/apk/debug/*.apk' -print -quit)" release-assets/TVShell-Anime-Android-TV.apk
      - name: Prepare Release Metadata
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=TVShell ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "notes=Automated macOS, Windows, and Android TV release for ${GITHUB_REF_NAME}." >> "$GITHUB_OUTPUT"
            echo "mode=versioned" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "title=TVShell latest" >> "$GITHUB_OUTPUT"
            echo "notes=Automated macOS, Windows, and Android TV release from main at ${GITHUB_SHA}." >> "$GITHUB_OUTPUT"
            echo "mode=rolling" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag }}"
          TITLE="${{ steps.release.outputs.title }}"
          NOTES="${{ steps.release.outputs.notes }}"
          ASSETS=(release-assets/*)
          if [[ "${{ steps.release.outputs.mode }}" == "rolling" ]]; then
            gh release delete "$TAG" --yes --cleanup-tag || true
            gh release create "$TAG" "${ASSETS[@]}" \
              --target "${GITHUB_SHA}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          elif gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
